<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#090909">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Every Grateful Dead show, 1965–1995. Setlists, streams, and a time machine.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Dead Time Machine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --black:#090909;--panel:#141414;--card:#181818;--border:#252525;--subtle:#2e2e2e;
  --gold:#C9943A;--amber:#E8A820;--cream:#EDE5D5;
  --dim:#8b8478;--faint:#5c574e;
  --teal:#3AA08C;--purple:#8A62BC;--crimson:#C24A4A;
  --font-display:'Cinzel',serif;--font-body:'Barlow',sans-serif;--font-ui:'Barlow Condensed',sans-serif;
  --t:.22s cubic-bezier(.4,0,.2,1);
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}

html{height:100%;background:var(--black)}

body{min-height:100%;background:var(--black);color:var(--cream);font-family:var(--font-body);-webkit-font-smoothing:antialiased;overscroll-behavior:none}

/* VIEWS */
.view{position:fixed;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--black);transition:opacity var(--t),transform var(--t);will-change:transform,opacity;z-index:1}
.view.r{transform:translateX(100%);opacity:0;pointer-events:none}
.view.l{transform:translateX(-28%);opacity:0;pointer-events:none}

/* NAV BAR */
.nav{position:sticky;top:0;z-index:20;background:rgba(9,9,9,.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:var(--safe-t) 16px 0;height:calc(54px + var(--safe-t));display:flex;align-items:center;gap:12px}
.back{background:none;border:none;color:var(--gold);font-size:26px;cursor:pointer;padding:8px 10px 8px 0;flex-shrink:0;font-family:var(--font-ui);line-height:1}
.nav-t{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-s{font-family:var(--font-ui);font-size:11px;color:var(--dim);letter-spacing:1px;margin-top:1px}

/* HOME */
#home{padding-bottom:calc(72px + var(--safe-b))}

.hero{padding:calc(54px + var(--safe-t)) 20px 34px;text-align:center;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0f0f0f 0%,var(--black) 100%);position:relative;overflow:hidden}
.hero-art{position:absolute;inset:-40% -20%;pointer-events:none;opacity:.5;background:
  radial-gradient(circle at 30% 20%,rgba(201,148,58,.14),transparent 42%),
  radial-gradient(circle at 75% 65%,rgba(138,98,188,.12),transparent 45%),
  radial-gradient(circle at 55% 35%,rgba(58,160,140,.10),transparent 38%)}
.hero-spiral{position:absolute;left:50%;top:46%;width:340px;height:340px;transform:translate(-50%,-50%);opacity:.16;pointer-events:none;animation:spin 90s linear infinite}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.hero-spiral{animation:none}}
.hero>*{position:relative}
.hero-eye{font-family:var(--font-ui);font-weight:500;font-size:12px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:16px}
.hero-h{font-family:var(--font-display);font-size:clamp(30px,9vw,46px);font-weight:900;color:var(--cream);letter-spacing:.03em;line-height:1.05;text-shadow:0 0 60px rgba(201,148,58,.18)}
.hero-h em{display:block;font-style:normal;color:var(--gold);font-weight:400;font-size:.62em;letter-spacing:.2em;margin-bottom:6px}
.hero-sub{font-family:var(--font-ui);font-weight:400;font-size:12px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:14px}

/* SECTION HEADERS */
.sec{padding:28px 16px 0}
.sec-eye{font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-eye::after{content:'';flex:1;height:1px;background:var(--border)}

/* SHOW OF DAY CARD */
.sotd{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;position:relative}
.sotd::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--era-color,var(--gold));z-index:1}
.sotd:active{background:#1d1d1d}
.sotd-in{padding:18px 18px 16px 22px;position:relative}
.sotd-date{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--cream);font-variant-numeric:tabular-nums}
.sotd-dow{font-family:var(--font-ui);font-size:11px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.sotd-venue{font-size:15px;color:#c2baa8;margin-top:10px;line-height:1.3;font-weight:400}
.sotd-city{font-family:var(--font-ui);font-size:13px;color:var(--teal);letter-spacing:.5px;margin-top:4px}
.sotd-era{font-family:var(--font-ui);font-size:11px;color:var(--dim);margin-top:8px;letter-spacing:1px}
.sotd-songs{margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:3px}
.sotd-song{font-size:14px;color:var(--cream);font-weight:400;line-height:1.5}
.sotd-song.hi{color:var(--amber);font-weight:500}
.sotd-more{font-family:var(--font-ui);font-size:11px;color:var(--dim);letter-spacing:1px;margin-top:4px}
.sotd-ft{display:flex;justify-content:space-between;align-items:center;padding:10px 18px 12px 22px;border-top:1px solid var(--border);background:var(--panel)}
.sotd-src{font-family:var(--font-ui);font-size:10px;color:var(--faint);letter-spacing:.5px}
.sotd-listen{font-family:var(--font-ui);font-size:11px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;text-decoration:none}
.sk{height:220px;display:flex;align-items:center;justify-content:center;font-family:var(--font-ui);font-size:12px;letter-spacing:2px;color:var(--faint);text-transform:uppercase;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{50%{opacity:.35}}

/* RANDOM BUTTON */
.rand-wrap{padding:16px 16px 0}
.rand-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:rgba(201,148,58,.08);border:1px solid rgba(201,148,58,.35);border-radius:10px;padding:14px;cursor:pointer;transition:background var(--t)}
.rand-btn:active{background:rgba(201,148,58,.2)}
.rand-btn .bolt{color:var(--amber);font-size:16px}
.rand-btn span{font-family:var(--font-ui);font-size:13px;font-weight:600;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase}

/* TABS */
.browse{margin-top:6px}
.tabs{display:flex;gap:0;padding:0 16px;border-bottom:1px solid var(--border);margin-top:14px}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--dim);font-family:var(--font-ui);font-size:13px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;padding:12px 14px;cursor:pointer;transition:color var(--t)}
.tab.on{color:var(--cream);border-bottom-color:var(--gold)}
.tp{display:none}
.tp.on{display:block}

/* SEARCH */
.srch-wrap{padding:14px 16px 4px}
.srch-box{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--subtle);border-radius:8px;padding:0 14px}
.srch-box:focus-within{border-color:var(--gold)}
.srch-box .mag{color:var(--dim);font-size:15px}
.srch-in{flex:1;background:none;border:none;outline:none;color:var(--cream);font-family:var(--font-body);font-size:16px;padding:12px 0}
.srch-in::placeholder{color:var(--faint)}
.srch-hint{font-family:var(--font-ui);font-size:11px;color:var(--faint);letter-spacing:.5px;padding:10px 18px 0}
.sh-match{font-family:var(--font-ui);font-size:12px;color:var(--amber);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ERA LIST */
.era-row{display:flex;align-items:center;justify-content:space-between;padding:18px 16px;border-bottom:1px solid var(--border);cursor:pointer;position:relative;overflow:hidden;transition:background var(--t)}
.era-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--era-color)}
.era-row::after{content:'';position:absolute;right:-30px;top:50%;width:190px;height:190px;transform:translateY(-50%);border-radius:50%;background:radial-gradient(circle,var(--era-color) 0%,transparent 65%);opacity:.13;pointer-events:none}
.era-row:active{background:var(--panel)}
.era-in{position:relative}
.era-name{font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--cream)}
.era-yrs{font-family:var(--font-ui);font-size:12px;color:var(--dim);letter-spacing:1px;margin-top:3px}
.era-r{display:flex;align-items:center;gap:10px;position:relative}
.era-cnt{font-family:var(--font-ui);font-size:12px;color:var(--dim)}
.era-chev{color:var(--faint);font-size:20px;font-family:var(--font-ui)}

/* YEAR GRID */
.yr-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;padding-top:1px}
.yr-btn{background:var(--panel);border:none;border-bottom:1px solid var(--border);cursor:pointer;padding:13px 6px;text-align:center;transition:background var(--t)}
.yr-btn:active{background:#1d1d1d}
.yr-n{font-family:var(--font-display);font-size:14px;color:var(--cream);display:block;font-weight:700}
.yr-c{font-family:var(--font-ui);font-size:10px;color:var(--dim);letter-spacing:.5px;display:block;margin-top:2px}

.home-ft{padding:32px 20px 0;text-align:center}
.home-ft p{font-family:var(--font-ui);font-size:11px;color:var(--faint);letter-spacing:.5px;line-height:1.9}
.home-ft a{color:var(--gold);text-decoration:none}

/* LIST VIEW */
.show-row{display:flex;align-items:flex-start;padding:0 16px;border-bottom:1px solid var(--border);cursor:pointer;min-height:72px;transition:background var(--t)}
.show-row:active{background:var(--panel)}
.dt-col{padding:14px 14px 14px 0;border-right:1px solid var(--subtle);margin-right:14px;flex-shrink:0;text-align:right;width:50px}
.dt-m{font-family:var(--font-ui);font-size:10px;font-weight:500;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;display:block}
.dt-d{font-family:var(--font-display);font-size:20px;font-weight:900;color:var(--cream);line-height:1.1;font-variant-numeric:tabular-nums}
.dt-y{font-family:var(--font-ui);font-size:10px;color:var(--dim);display:block}
.sh-info{padding:13px 0;flex:1;min-width:0}
.sh-venue{font-size:15px;color:var(--cream);font-weight:400;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sh-city{font-family:var(--font-ui);font-size:12px;color:var(--teal);margin-top:3px}
.sh-badge{font-family:var(--font-ui);font-size:11px;color:var(--crimson);margin-top:3px;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sh-chev{font-family:var(--font-ui);font-size:18px;color:var(--subtle);padding:14px 0 14px 8px;align-self:center;flex-shrink:0}

/* SHOW DETAIL */
.show-hero{padding:24px 20px 22px;border-bottom:1px solid var(--border);position:relative;background:linear-gradient(180deg,#121212 0%,var(--black) 100%);overflow:hidden}
.show-hero::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--era-color,var(--gold));z-index:2}
.hero-photo{position:absolute;inset:0;background-size:cover;background-position:center 30%;opacity:0;transition:opacity .6s ease;z-index:0}
.hero-photo.on{opacity:.34}
.hero-photo::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(9,9,9,.28) 0%,rgba(9,9,9,.86) 78%,var(--black) 100%)}
.hero-tint{position:absolute;inset:0;z-index:0;opacity:.5;background:radial-gradient(circle at 80% 10%,var(--era-color,var(--gold)) 0%,transparent 52%);mix-blend-mode:overlay}
.show-hero>.sh-c{position:relative;z-index:1}
.photo-cred{position:absolute;right:10px;bottom:8px;z-index:3;font-family:var(--font-ui);font-size:10px;letter-spacing:.5px;color:rgba(237,229,213,.55);text-decoration:none;background:rgba(9,9,9,.5);padding:2px 7px;border-radius:4px;opacity:0;transition:opacity .6s ease}
.photo-cred.on{opacity:1}
.sh-date{font-family:var(--font-display);font-size:clamp(20px,5.5vw,28px);font-weight:900;color:var(--cream);font-variant-numeric:tabular-nums}
.sh-dow{font-family:var(--font-ui);font-size:12px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.sh-venue-big{font-size:17px;color:var(--cream);margin-top:14px;line-height:1.3;font-weight:400}
.sh-city-big{font-family:var(--font-ui);font-size:14px;color:var(--teal);margin-top:5px;letter-spacing:.5px}
.sh-era-lbl{font-family:var(--font-ui);font-size:11px;color:var(--dim);margin-top:10px;letter-spacing:1.5px;text-transform:uppercase}
.sh-badge-big{display:inline-block;margin-top:10px;background:rgba(194,74,74,.13);border:1px solid rgba(194,74,74,.35);border-radius:4px;padding:4px 10px;font-family:var(--font-ui);font-size:11px;color:var(--crimson);letter-spacing:.5px}

/* PLAYER */
.player-blk{margin:18px 20px 0}
.play-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:rgba(201,148,58,.12);border:1px solid rgba(201,148,58,.4);border-radius:10px;padding:15px;cursor:pointer;transition:background var(--t)}
.play-btn:active{background:rgba(201,148,58,.22)}
.play-btn .tri{color:var(--amber);font-size:14px}
.play-btn span{font-family:var(--font-ui);font-size:13px;font-weight:600;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase}
.play-btn[disabled]{opacity:.55;pointer-events:none}
.player-frame{margin-top:10px;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#000}
.player-frame iframe{display:block;width:100%;height:340px;border:0}
.player-meta{font-family:var(--font-ui);font-size:11px;color:var(--dim);letter-spacing:.5px;margin-top:8px;line-height:1.6}
.player-meta a{color:var(--gold);text-decoration:none}
.player-err{font-family:var(--font-ui);font-size:12px;color:var(--dim);letter-spacing:.5px;margin-top:10px;line-height:1.6}
.player-err a{color:var(--gold)}

.setlist-wrap{padding-bottom:calc(80px + var(--safe-b))}
.set-block{padding:20px 20px 0}
.set-lbl{font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);padding-bottom:10px;border-bottom:1px solid var(--subtle);margin-bottom:2px}
.set-lbl.enc{color:var(--purple)}

.song-row{display:flex;align-items:baseline;gap:10px;padding:8px 0;border-bottom:1px solid #1a1a1a}
.song-row:last-child{border-bottom:none}
.sn{font-family:var(--font-ui);font-size:11px;color:var(--faint);width:18px;flex-shrink:0;text-align:right;font-variant-numeric:tabular-nums}
.s{font-size:16px;color:var(--cream);flex:1;line-height:1.35;font-weight:400;letter-spacing:.2px}
.s.hi{color:var(--amber);font-weight:500}
.s.en{color:#ab9bd1;font-style:italic}

.sh-footer{margin:22px 20px 0;padding:14px 16px;background:var(--panel);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;gap:10px}
.sh-ft-src{font-family:var(--font-ui);font-size:11px;color:var(--faint);letter-spacing:.5px;line-height:1.7}
.sh-ft-btns{display:flex;gap:8px}
.arch-btn{display:flex;align-items:center;justify-content:center;gap:6px;background:rgba(201,148,58,.1);border:1px solid rgba(201,148,58,.28);border-radius:6px;padding:10px 12px;text-decoration:none;flex:1;transition:background var(--t)}
.arch-btn:active{background:rgba(201,148,58,.2)}
.arch-btn span{font-family:var(--font-ui);font-size:11px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;text-align:center}

.load-err{padding:60px 30px;text-align:center;font-family:var(--font-ui);font-size:13px;color:var(--dim);letter-spacing:1px;line-height:2}
.load-err button{background:none;border:1px solid var(--gold);border-radius:6px;color:var(--gold);font-family:var(--font-ui);font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:10px 22px;margin-top:14px;cursor:pointer}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--black)}
::-webkit-scrollbar-thumb{background:var(--subtle);border-radius:2px}
</style>
</head>
<body>

<!-- HOME -->
<div class="view" id="home">
  <div class="hero">
    <div class="hero-art"></div>
    <svg class="hero-spiral" viewBox="0 0 200 200" aria-hidden="true">
      <g fill="none" stroke="#C9943A" stroke-width="1">
        <circle cx="100" cy="100" r="30" opacity=".9"/>
        <circle cx="100" cy="100" r="52" opacity=".65"/>
        <circle cx="100" cy="100" r="74" opacity=".45"/>
        <circle cx="100" cy="100" r="96" opacity=".3"/>
        <path d="M100 4 L100 196 M4 100 L196 100 M32 32 L168 168 M168 32 L32 168" opacity=".35"/>
      </g>
    </svg>
    <div class="hero-eye">Grateful Dead</div>
    <h1 class="hero-h"><em>The</em>Time Machine</h1>
    <p class="hero-sub">Every night · Every song · 1965–1995</p>
  </div>

  <div class="sec">
    <div class="sec-eye">Show of the Day</div>
    <div class="sotd" id="sotd"><div class="sk">Tuning in…</div></div>
  </div>

  <div class="rand-wrap">
    <button class="rand-btn" id="rand-btn"><span class="bolt">⚡</span><span>Take me anywhere</span></button>
  </div>

  <div class="browse">
    <div class="sec-eye" style="margin:22px 16px 0;padding:0">Browse</div>
    <div class="tabs">
      <button class="tab on" data-tp="eras">By Era</button>
      <button class="tab" data-tp="years">By Year</button>
      <button class="tab" data-tp="srch">Search</button>
    </div>
    <div class="tp on" id="tp-eras"><div class="era-list" id="era-list"></div></div>
    <div class="tp" id="tp-years"><div class="yr-grid" id="yr-grid"></div></div>
    <div class="tp" id="tp-srch">
      <div class="srch-wrap">
        <div class="srch-box"><span class="mag">⌕</span><input class="srch-in" id="srch-in" type="search" placeholder="Song, venue, city, or date…" autocomplete="off"></div>
      </div>
      <div class="srch-hint" id="srch-hint">Try “Scarlet Begonias”, “Red Rocks”, or “1977”</div>
      <div class="show-list" id="srch-list"></div>
    </div>
  </div>

  <div class="home-ft">
    <p>Setlists verified from <a href="https://www.setlists.net" target="_blank" rel="noopener">setlists.net</a> · Streams &amp; recordings from <a href="https://archive.org/details/GratefulDead" target="_blank" rel="noopener">Archive.org</a></p>
  </div>
</div>

<!-- LIST -->
<div class="view r" id="list-view">
  <div class="nav">
    <button class="back" id="list-back" aria-label="Back">‹</button>
    <div><div class="nav-t" id="list-t"></div><div class="nav-s" id="list-s"></div></div>
  </div>
  <div class="show-list" id="show-list"></div>
</div>

<!-- SHOW -->
<div class="view r" id="show-view">
  <div class="nav">
    <button class="back" id="show-back" aria-label="Back">‹</button>
    <div><div class="nav-t" id="show-t"></div><div class="nav-s" id="show-s"></div></div>
  </div>
  <div id="show-content"></div>
</div>

<script>
// ─── DATA is loaded async from shows-data.json (same ERAS structure the scraper produces) ───
let ERAS = [], ALL = [], YR_MAP = {};

const HI = new Set(["Dark Star","Morning Dew","Terrapin Station","St. Stephen",
  "Unbroken Chain","Eyes Of The World","Scarlet Begonias","Estimated Prophet",
  "Attics Of My Life","So Many Roads","Black Muddy River","China Doll",
  "Death Don't Have No Mercy","He's Gone","Stella Blue","Wharf Rat",
  "Fire On The Mountain","Greatest Story Ever Told","Bird Song"]);
const isHi = s => { for (const h of HI) if (s.includes(h)) return true; return false; };

const MOS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const MOL = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const pd = d => { const [y,m,day] = d.split('-').map(Number); return {y,m,day}; };
const fmtL = d => { const {y,m,day} = pd(d); return `${MOL[m-1]} ${day}, ${y}`; };
const archUrl = d => `https://archive.org/search?query=collection%3A%22GratefulDead%22+AND+date%3A${d}`;
const slUrl = id => `https://www.setlists.net/?show_id=${id}`;

async function venuePhoto(venue) {
  const title = VENUE_WIKI[venue];
  if (!title) return null;
  const key = 'wimg:' + title;
  try {
    const c = localStorage.getItem(key);
    if (c === 'x') return null;           // negative cache
    if (c) return JSON.parse(c);
  } catch(e){}
  try {
    const r = await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(title));
    if (!r.ok) throw 0;
    const j = await r.json();
    let src = j.thumbnail && j.thumbnail.source;
    if (!src) throw 0;
    src = src.replace(/\/(\d+)px-/, '/800px-'); // request a larger thumb
    const out = { src, page: (j.content_urls && j.content_urls.desktop && j.content_urls.desktop.page) || ('https://en.wikipedia.org/wiki/' + encodeURIComponent(title)) };
    try { localStorage.setItem(key, JSON.stringify(out)); } catch(e){}
    return out;
  } catch(e) {
    try { localStorage.setItem(key, 'x'); } catch(_){}
    return null;
  }
}

// ─── ARCHIVE.ORG: find the best recording for a date ───
async function bestRecording(date) {
  const q = encodeURIComponent(`collection:GratefulDead AND date:${date}`);
  const url = `https://archive.org/advancedsearch.php?q=${q}&fl[]=identifier&fl[]=avg_rating&fl[]=num_reviews&fl[]=downloads&rows=100&page=1&output=json`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('archive search failed');
  const docs = (await r.json()).response.docs || [];
  if (!docs.length) return null;
  const score = d => {
    let s = 0;
    if (/sbd|soundboard/i.test(d.identifier)) s += 2.5;
    if (/miller|charlie|bertha|gems/i.test(d.identifier)) s += .5;
    s += (parseFloat(d.avg_rating) || 0) * .6;
    s += Math.log10((parseInt(d.downloads) || 0) + 1) * .35;
    return s;
  };
  docs.sort((a,b) => score(b) - score(a));
  return { id: docs[0].identifier, count: docs.length };
}

// ─── SHOW OF THE DAY ───
function todayShow() {
  const n = new Date();
  const seed = n.getFullYear()*1000 + Math.floor((n - new Date(n.getFullYear(),0,0))/86400000);
  return ALL[seed % ALL.length];
}

function renderSOTD() {
  const s = todayShow();
  const {m, day} = pd(s.date);
  const el = document.getElementById('sotd');
  el.style.setProperty('--era-color', s.era.color);
  const allSongs = s.sets.flatMap(set => set.enc ? [] : set.songs);
  const top = allSongs.slice(0,5);
  const more = allSongs.length - 5;
  el.innerHTML = `
    <div class="sotd-in">
      <div class="sotd-date">${MOL[m-1]} ${day}, ${s.date.slice(0,4)}</div>
      <div class="sotd-dow">${s.dow}</div>
      <div class="sotd-venue">${s.venue}</div>
      <div class="sotd-city">${s.city}</div>
      <div class="sotd-era">${s.era.name} · ${s.era.years}</div>
      <div class="sotd-songs">
        ${top.map(song=>`<span class="sotd-song${isHi(song)?' hi':''}">${song}</span>`).join('')}
        ${more>0?`<span class="sotd-more">+${more} more songs</span>`:''}
      </div>
    </div>
    <div class="sotd-ft">
      <span class="sotd-src">setlists.net · show #${s.id}</span>
      <a class="sotd-listen" href="${archUrl(s.date)}" target="_blank" rel="noopener">Listen ↗</a>
    </div>`;
  el.onclick = e => { if (e.target.classList.contains('sotd-listen')) return; navShow(s, true); };
}

// ─── ERA LIST ───
function renderEras() {
  const el = document.getElementById('era-list');
  el.innerHTML = ERAS.map(e=>`
    <div class="era-row" style="--era-color:${e.color}" data-id="${e.id}">
      <div class="era-in">
        <div class="era-name">${e.name}</div>
        <div class="era-yrs">${e.years}</div>
      </div>
      <div class="era-r">
        <span class="era-cnt">${e.shows.length} show${e.shows.length>1?'s':''}</span>
        <span class="era-chev">›</span>
      </div>
    </div>`).join('');
  el.querySelectorAll('.era-row').forEach(r=>{
    r.onclick=()=>{
      const e=ERAS.find(x=>x.id===r.dataset.id);
      navList(e.name, e.years+' · '+e.shows.length+' shows', e.shows.map(s=>({...s,era:e})));
    };
  });
}

// ─── YEAR GRID ───
function renderYears() {
  const el = document.getElementById('yr-grid');
  el.innerHTML = Object.keys(YR_MAP).sort().map(y=>`
    <button class="yr-btn" data-y="${y}">
      <span class="yr-n">${y}</span>
      <span class="yr-c">${YR_MAP[y].length} show${YR_MAP[y].length>1?'s':''}</span>
    </button>`).join('');
  el.querySelectorAll('.yr-btn').forEach(b=>{
    b.onclick=()=>{ const y=b.dataset.y; navList(y, YR_MAP[y].length+' shows', YR_MAP[y]); };
  });
}

// ─── SHOW ROW MARKUP (shared by lists & search) ───
function rowHTML(s, i, match) {
  const {m,day,y} = pd(s.date);
  return `
    <div class="show-row" data-i="${i}">
      <div class="dt-col">
        <span class="dt-m">${MOS[m-1]}</span>
        <div class="dt-d">${day}</div>
        <span class="dt-y">${y}</span>
      </div>
      <div class="sh-info">
        <div class="sh-venue">${s.venue}</div>
        <div class="sh-city">${s.city}</div>
        ${match?`<div class="sh-match">♪ ${match}</div>`:''}
        ${s.badge?`<div class="sh-badge">${s.badge}</div>`:''}
      </div>
      <div class="sh-chev">›</div>
    </div>`;
}

let _curShows = [];
function renderShowList(shows) {
  _curShows = shows;
  const el = document.getElementById('show-list');
  el.innerHTML = shows.map((s,i)=>rowHTML(s,i)).join('');
  el.querySelectorAll('.show-row').forEach(r=>{
    r.onclick=()=>navShow(_curShows[+r.dataset.i]);
  });
}

// ─── SEARCH ───
let _srchRes = [];
function runSearch(q) {
  const el = document.getElementById('srch-list');
  const hint = document.getElementById('srch-hint');
  q = q.trim().toLowerCase();
  if (q.length < 2) { el.innerHTML=''; hint.textContent='Try “Scarlet Begonias”, “Red Rocks”, or “1977”'; return; }
  const res = [];
  for (const s of ALL) {
    let match = null;
    if (s.venue.toLowerCase().includes(q) || s.city.toLowerCase().includes(q) || s.date.includes(q) || fmtL(s.date).toLowerCase().includes(q)) {
      match = '';
    } else {
      outer: for (const st of s.sets) for (const song of st.songs) {
        if (song.toLowerCase().includes(q)) { match = song; break outer; }
      }
    }
    if (match !== null) { res.push({s, match}); if (res.length >= 120) break; }
  }
  _srchRes = res;
  hint.textContent = res.length ? `${res.length}${res.length>=120?'+':''} show${res.length>1?'s':''} found` : 'Nothing found — try fewer words';
  el.innerHTML = res.map((r,i)=>rowHTML(r.s, i, r.match)).join('');
  el.querySelectorAll('.show-row').forEach(r=>{
    r.onclick=()=>navShow(_srchRes[+r.dataset.i].s, true);
  });
}
let _deb;
document.getElementById('srch-in').addEventListener('input', e=>{
  clearTimeout(_deb); _deb = setTimeout(()=>runSearch(e.target.value), 160);
});

// ─── SHOW DETAIL ───
function renderShowDetail(s) {
  const setHTML = s.sets.map(set=>{
    const songs = set.songs.map((song,i)=>`
      <div class="song-row">
        <span class="sn">${set.enc?'':i+1}</span>
        <span class="s${isHi(song)?' hi':''}${set.enc?' en':''}">${song}</span>
      </div>`).join('');
    return `<div class="set-block"><div class="set-lbl${set.enc?' enc':''}">${set.lbl}</div>${songs}</div>`;
  }).join('');

  document.getElementById('show-content').innerHTML = `
    <div class="show-hero" style="--era-color:${s.era.color}">
      <div class="hero-photo" id="hero-photo"></div>
      <div class="hero-tint"></div>
      <a class="photo-cred" id="photo-cred" target="_blank" rel="noopener">Photo · Wikipedia</a>
      <div class="sh-c">
        <div class="sh-date">${fmtL(s.date)}</div>
        <div class="sh-dow">${s.dow}</div>
        <div class="sh-venue-big">${s.venue}</div>
        <div class="sh-city-big">${s.city}</div>
        <div class="sh-era-lbl">${s.era.name} · ${s.era.years}</div>
        ${s.badge?`<div class="sh-badge-big">${s.badge}</div>`:''}
      </div>
    </div>
    <div class="player-blk" id="player-blk">
      <button class="play-btn" id="play-btn"><span class="tri">▶</span><span>Play this show</span></button>
    </div>
    <div class="setlist-wrap">
      ${setHTML}
      <div class="sh-footer">
        <div class="sh-ft-src">Source: setlists.net · Show ID #${s.id}</div>
        <div class="sh-ft-btns">
          <a class="arch-btn" href="${archUrl(s.date)}" target="_blank" rel="noopener"><span>Archive.org ↗</span></a>
          <a class="arch-btn" href="${slUrl(s.id)}" target="_blank" rel="noopener"><span>setlists.net ↗</span></a>
        </div>
      </div>
    </div>`;

  // venue photo (async, graceful fallback to era art)
  venuePhoto(s.venue).then(p=>{
    if (!p) return;
    const ph = document.getElementById('hero-photo'), cr = document.getElementById('photo-cred');
    if (!ph) return; // user already navigated away
    const img = new Image();
    img.onload = () => { ph.style.backgroundImage = `url("${p.src}")`; ph.classList.add('on'); cr.href = p.page; cr.classList.add('on'); };
    img.src = p.src;
  });

  // inline player (on demand)
  const btn = document.getElementById('play-btn');
  btn.onclick = async () => {
    btn.disabled = true;
    btn.querySelector('span:last-child').textContent = 'Finding best recording…';
    const blk = document.getElementById('player-blk');
    try {
      const rec = await bestRecording(s.date);
      if (!rec) throw new Error('none');
      blk.innerHTML = `
        <div class="player-frame"><iframe src="https://archive.org/embed/${rec.id}?playlist=1&list_height=280" allow="autoplay; encrypted-media" loading="lazy" title="Grateful Dead ${s.date} — Archive.org player"></iframe></div>
        <div class="player-meta">Best of ${rec.count} recording${rec.count>1?'s':''} on Archive.org · <a href="${archUrl(s.date)}" target="_blank" rel="noopener">See all ↗</a></div>`;
    } catch(e) {
      blk.innerHTML = `<div class="player-err">Couldn't reach Archive.org — <a href="${archUrl(s.date)}" target="_blank" rel="noopener">open recordings in a new tab ↗</a></div>`;
    }
  };
}

// ─── NAV ───
const $home = document.getElementById('home');
const $list = document.getElementById('list-view');
const $show = document.getElementById('show-view');
let _showBack = 'list';

function navList(title, sub, shows) {
  document.getElementById('list-t').textContent = title;
  document.getElementById('list-s').textContent = sub;
  renderShowList(shows);
  $list.scrollTop = 0;
  $home.classList.add('l');
  $list.classList.remove('r','l');
  $show.classList.add('r'); $show.classList.remove('l');
}

function navShow(s, fromHome=false) {
  renderShowDetail(s);
  document.getElementById('show-t').textContent = s.venue;
  document.getElementById('show-s').textContent = fmtL(s.date);
  $show.scrollTop = 0;
  _showBack = fromHome ? 'home' : 'list';
  if (fromHome) { $home.classList.add('l'); $list.classList.add('r'); }
  else { $list.classList.add('l'); $list.classList.remove('r'); }
  $show.classList.remove('r','l');
}

document.getElementById('list-back').onclick = () => {
  $list.classList.add('r'); $list.classList.remove('l');
  $home.classList.remove('l');
};
document.getElementById('show-back').onclick = () => {
  $show.classList.add('r');
  if (_showBack === 'home') {
    $home.classList.remove('l');
    $list.classList.add('r'); $list.classList.remove('l');
  } else {
    $list.classList.remove('l','r');
  }
};

// Tabs
document.querySelectorAll('.tab').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    document.querySelectorAll('.tp').forEach(p=>p.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById('tp-'+btn.dataset.tp).classList.add('on');
    if (btn.dataset.tp==='srch') document.getElementById('srch-in').focus();
  };
});

// Random show
document.getElementById('rand-btn').onclick = () => {
  if (!ALL.length) return;
  navShow(ALL[Math.floor(Math.random()*ALL.length)], true);
};

// ─── INIT: load data, then render ───
async function boot() {
  try {
    const r = await fetch('shows-data.json');
    if (!r.ok) throw new Error(r.status);
    ERAS = await r.json();
    ALL = ERAS.flatMap(e => e.shows.map(s => ({...s, era:e})));
    YR_MAP = {};
    ALL.forEach(s => { const y = s.date.slice(0,4); (YR_MAP[y] = YR_MAP[y]||[]).push(s); });
    renderSOTD();
    renderEras();
    renderYears();
  } catch(e) {
    document.getElementById('sotd').innerHTML =
      `<div class="load-err">Couldn't load the shows.<br><button onclick="location.reload()">Retry</button></div>`;
  }
}
boot();

// ─── PWA ───
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
